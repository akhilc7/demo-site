<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>StackDemo</title>
</head>
<body>
<div class="Modal_modal__3I0HK">
<div>Select Username</div>
<input id="username" type="text">
<div>Select Password</div>
<input id="password" type="password">
<button id="login-btn" type="submit">Log In</button>
</div>
<script>
document.getElementById('login-btn').addEventListener('click', function (e) {
  e.preventDefault();
  if (!document.querySelector('.api-error')) {
    var err = document.createElement('div');
    err.className = 'api-error';
    err.textContent = 'Invalid Username';
    document.querySelector('.Modal_modal__3I0HK').appendChild(err);
  }
});
</script>
</body>
</html>
